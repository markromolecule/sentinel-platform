version: 2
updates:
  # Maintain GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci(deps)"
    labels:
      - "dependencies"
      - "actions"
    groups:
      actions-group:
        patterns:
          - "*"

  # Maintain All pnpm Workspace dependencies (Web, API, Mobile)
  - package-ecosystem: "npm" 
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "monorepo"
    groups:
      # 1. Group all Web & Mobile (Frontend) updates together
      frontend-ecosystem:
        patterns:
          - "react"
          - "react-*"
          - "next"
          - "expo*"
          - "@expo/*"
          - "react-native*"

      # 2. Group Backend/API dependencies
      backend-ecosystem:
        patterns:
          - "hono"
          - "@hono/*"
          - "prisma"
          - "@prisma/*"
          - "supabase"
          - "@supabase/*"
          - "kysely"
          - "kysely-*"

      # 3. Group all Tooling & Dev dependencies together
      tooling-and-types:
        patterns:
          - "eslint*"
          - "prettier"
          - "typescript"
          - "@types/*"
          - "turbo"