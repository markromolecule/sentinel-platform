version: 2
updates:
  # Maintain GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci(deps)"
    labels:
      - "dependencies"
      - "actions"

  # Maintain All pnpm Workspace dependencies (Web, API, Mobile)
  - package-ecosystem: "npm" # Dependabot uses "npm" to represent pnpm as well
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "monorepo"